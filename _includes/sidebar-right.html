<aside class="sidebar-right">
    {% include theme-switcher.html %}

    {% assign pinned = site.posts | where: "pin", true | limit: 5 %}

    {% if pinned.size > 0 %}
        {% for post in pinned %}
            <div class="pinned-post-card">
                <div class="pinned-label">📌 Pinned</div>
                <h3 class="pinned-title">
                    <a href="{{ post.url }}">{{ post.title }}</a>
                </h3>
                <div class="pinned-excerpt">{{ post.excerpt }}</div>
            </div>
        {% endfor %}
    {% else %}
        <div style="font-size: 0.85rem; color: var(--meta-color); text-align: center; padding: 20px;">
            No pinned posts yet.
        </div>
    {% endif %}
</aside>
