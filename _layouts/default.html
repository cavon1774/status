<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{{ site.url }}/assets/images/share-default.jpg">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ site.url }}/assets/images/share-default.jpg">
</head>
<body>

    <div class="container">
        <!-- Profile Header -->
        <header class="profile-header">
            <div class="avatar">
                <img src="{{ site.author.avatar }}" alt="{{ site.author.name }}">
            </div>
            <h1>{{ site.author.name }}</h1>
            <p class="bio">{{ site.author.bio }}</p>
            <div class="social-links">
                <a href="https://facebook.com/darbookspub"><i class="fab fa-facebook-f"></i></a>
                <a href="https://github.com/breakthebull"><i class="fab fa-github"></i></a>
                <a href="https://darbooks.com"><i class="fab fa-link"></i></a>
                <a href="https://books2read.com/ap/nzmyLl/DA-Rasmussen"><i class="fab fa-draft2digital"></i></a>
            </div>
        </header>

        <!-- The Feed -->
        <main class="feed">
            {{ content }}
        </main>
        
        <footer>
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. Powered by Jekyll.</p>
        </footer>
    </div>

</body>
</html>
