<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <!-- Add FontAwesome for icons if you want -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Profile Header -->
        <header class="profile-header">
            <div class="avatar">
                <img src="{{ site.author.avatar }}" alt="{{ site.author.name }}">
            </div>
            <h1>{{ site.author.name }}</h1>
            <p class="bio">{{ site.author.bio }}</p>
            <div class="social-links">
                <!-- Add your links -->
                <a href="https://facebook.com/darbookspub"><i class="fab fa-facebook"></i></a>
                <a href="https://github.com/breakthebull"><i class="fab fa-github"></i></a>
            </div>
        </header>

        <!-- The Feed -->
        <main class="feed">
            {{ content }}
        </main>
        
        <footer>
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. Powered by Jekyll.</p>
        </footer>
    </div>

</body>
</html>
