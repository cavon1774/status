title: "My Status Wall"
description: "Quick updates and snippets."
baseurl: "" 
url: "https://status.darbooks.com"

# OLD (creates folders):
# permalink: /:year-:month-:day-:title/

# NEW (creates flat files):
permalink: /:title.html

# Build settings
markdown: kramdown
highlighter: rouge

# Mood Colors
moods:
  calm: "#87ceeb"        # Light blue
  happy: "#ffd700"       # Gold
  excited: "#ff6b6b"     # Red
  thoughtful: "#9b59b6"  # Purple
  tired: "#95a5a6"       # Gray
  creative: "#2ecc71"    # Green
  focused: "#3498db"     # Blue
  default: "#bdc3c7"     # Light gray fallback

# Variables for your profile
author:
  name: "DA Rasmussen"
  bio: "Posting book and status updates."
  avatar: "/assets/avatar.jpg"

# Enable featured true or false?
collections:
  featured:      
    output: true 
    permalink: /:title/