title: "Name this Page"
description: "Quick updates about DAR Books."
baseurl: ""
url: "https://breakthebull.github.io/status/"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

# OLD (creates folders):
# permalink: /:year-:month-:day-:title/

# NEW (creates flat files):
permalink: /:title.html

# Mood Colors
moods:
  calm: "#87ceeb"        # Light blue
  happy: "#ffd700"       # Gold
  excited: "#ff6b6b"     # Red
  thoughtful: "#9b59b6"  # Purple
  tired: "#95a5a6"       # Gray
  creative: "#2ecc71"    # Green
  focused: "#3498db"     # Blue
  default: "#bdc3c7"     # Light gray fallback

# Variables for your profile
author:
  name: "DA Rasmussen"
  bio: "Posting book and status updates."
  avatar: "/assets/avatar.jpg"

# Enable featured true or false?
collections:
  featured:      
    output: true 
    permalink: /:title/